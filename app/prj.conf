# Required for LVGL + display work on this app
CONFIG_MAIN_STACK_SIZE=8192

# Peripherals
CONFIG_DISPLAY=y
CONFIG_RTC=y

# LVGL core
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=8192
CONFIG_LV_Z_VDB_SIZE=64

# SSD1309 is monochrome
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_COLOR_MONO_HW_INVERSION=y

# Widgets/fonts used by this app
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_LINE=y
CONFIG_LV_FONT_MONTSERRAT_14=y
CONFIG_LV_FONT_MONTSERRAT_10=y

# Per-device runtime power management (safe — does NOT put system to sleep)
# Note: CONFIG_PM (system sleep) must NOT be enabled on this board.
# Deep sleep is entered explicitly through Zephyr's system poweroff path.
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# GPIO (for sleep button) and reboot (for wake from sleep)
CONFIG_GPIO=y
CONFIG_REBOOT=y
CONFIG_POWEROFF=y

# Compiler — size optimizations reduce flash reads and overall power
CONFIG_SIZE_OPTIMIZATIONS=y

# Logging — deferred mode, no UART backend (device runs on battery without USB host).
# Re-enable CONFIG_UART_CONSOLE=y and CONFIG_LOG_BACKEND_UART=y for USB debugging.
CONFIG_LOG=y
CONFIG_APP_LOG_LEVEL_DBG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_SERIAL=n

# WiFi
CONFIG_NETWORKING=y
CONFIG_WIFI=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=0

# DHCP
CONFIG_NET_DHCPV4=y

# NTP for time synchronization
CONFIG_SNTP=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# DNS resolver (needed for pool.ntp.org)
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=5000
